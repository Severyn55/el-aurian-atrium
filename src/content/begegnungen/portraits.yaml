portraits:
  - title: "Der Gastgeber"
    alt: "Der Gastgeber mit grauem Bart in weißem Hemd, Weste und roter Krawatte, lächelnd im eleganten Restaurant mit PORTFOLIO-Schild und Weinregalen im Hintergrund"
    caption: "Mit offener Haltung und einem warmen Lächeln empfängt er jeden Gast persönlich. Die Präsenz, die den Ton für den Abend setzt."
    subcaption: "Begrüßung"
    year: "2026"
    image: "20260604-der-gastgeber.jpg"
  - title: "Der Küchenchef"
    alt: "Der Küchenchef in schwarzem Jackett und weinroter Schürze, lächelnd mit dem Portfolio-Menü in der Hand vor der offenen Küche"
    caption: "Vom Gastgeber zum Koch – überall präsent, wo Perfektion zählt. Die Leidenschaft, die jedes Gericht trägt."
    subcaption: "In der Küche"
    year: "2026"
    image: "20260604-der-kuechenchef.jpg"
  - title: "Blick ins Restaurant"
    alt: "Weiter Blick in den eleganten Gastraum mit offener Küche, Marmortheke, gedeckten Tischen und dem großen PORTFOLIO-Schild"
    caption: "Offene Küche, warmes Licht und der großzügige Raum – hier beginnen die Abende und Begegnungen."
    subcaption: "Der Gastraum"
    year: "2025"
    image: "blick-in-das-restaurant.jpg"
  - title: "Abend im Restaurant"
    alt: "Gemütlicher Innenraum mit grünen Polsterbänken, offenem Holzofen, gedeckten Tischen am Fenster und kunstvollen Bildern an den Wänden"
    caption: "Kerzenlicht, der Blick auf die Straße und der Duft aus der offenen Küche. Der perfekte Ort für lange, unvergessliche Gespräche."
    subcaption: "Abendstimmung"
    year: "2025"
    image: "das-restaurant-von-innen.jpg"
